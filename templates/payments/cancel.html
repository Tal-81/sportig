{% extends 'base.html' %}

{% block content %}
<div class="page-wrapper">
    <div class="container">
        <div class="cancel-page">
            <div class="cancel-icon"><i class="fas fa-times-circle"></i></div>
            <h1>Payment Cancelled</h1>
            <p>Your payment was cancelled. Your cart has been saved and no charge was made.</p>
            {% if order %}
            <p>Order <strong>#{{ order.order_number }}</strong> is still pending.</p>
            {% endif %}
            <div class="cancel-actions">
                <a href="{% url 'cart:cart' %}" class="btn-primary">Return to Cart</a>
                <a href="{% url 'products:list' %}" class="btn-outline">Continue Shopping</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
