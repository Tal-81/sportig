{% extends 'base.html' %}
{% block content %}
<div class="auth-page"><div class="auth-card">
<h1 class="auth-title">Set New Password</h1>
<form method="post" class="auth-form">{% csrf_token %}
{% for field in form %}<div class="form-group"><label>{{ field.label }}</label>{{ field }}{% if field.errors %}<span class="field-error">{{ field.errors.0 }}</span>{% endif %}</div>{% endfor %}
<button type="submit" class="btn-auth">Set New Password</button>
</form></div></div>
{% endblock %}
