{% extends 'base.html' %}
{% block content %}
<div class="auth-page"><div class="auth-card" data-aos="fade-up">
<div class="auth-brand">
    <a href="{% url 'core:home' %}">
        <span class="logo-sportig">Sportig</span>
    </a>
</div>
<h1 class="auth-title">Reset Password</h1>
<p class="auth-sub">Enter your email and we'll send you a reset link.</p>
<form method="post" class="auth-form">{% csrf_token %}
<div class="form-group"><label>Email Address</label><input type="email" name="email" class="form-control" placeholder="Your email address" required></div>
<button type="submit" class="btn-auth">Send Reset Link <i class="fas fa-paper-plane"></i></button>
</form>
<p class="auth-switch"><a href="{% url 'users:login' %}"><i class="fas fa-arrow-left"></i> Back to Login</a></p>
</div></div>
{% endblock %}
